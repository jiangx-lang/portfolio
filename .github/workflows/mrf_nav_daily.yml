# MRF 基金净值工作日每日自动下载（北京时间 00:00）
# 拉取 akshare 968 系列过去 5 年数据，更新 data/nav/*.csv 并 push，Streamlit 从 GitHub Raw 读取
name: MRF NAV Daily Update

on:
  schedule:
    # 北京时间 工作日 00:00 = UTC 前一日 16:00（周一 00:00 北京 = 周日 16:00 UTC）
    - cron: '0 16 * * 0-4'
  workflow_dispatch: # 支持手动触发

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas

      - name: Run MRF NAV download
        run: python scripts/download_mrf_nav_akshare.py

      - name: Commit and push if CSV changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/nav/
          git diff --staged --quiet || (git commit -m "chore(nav): update MRF NAV CSV [automated]" && git push)
